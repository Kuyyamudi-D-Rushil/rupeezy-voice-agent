services:
  - type: web
    name: rupeezy-voice-agent
    runtime: python
    rootDir: rupeezy-voice-agent-sarvam- demoversion
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGINS
        value: ""
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
